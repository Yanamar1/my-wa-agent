services:
  - type: web
    name: ozer-whatsapp
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GREEN_API_URL
        sync: false
      - key: GREEN_API_INSTANCE
        sync: false
      - key: GREEN_API_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: LLM_MODEL
        value: claude-sonnet-4-6
      - key: SYSTEM_PROMPT
        value: "אתה עוזר - עוזר אישי חכם ואמין ב-WhatsApp. אתה מדבר בעברית בסגנון חברי אבל מקצועי. אתה עוזר עם ניהול יומן, תזכורות, זיכרון דברים, ניסוח הודעות וסיכומים. אתה תמציתי ולא מאריך שלא לצורך."
      - key: MAX_HISTORY
        value: "20"
      - key: DATABASE_PATH
        value: /data/conversations.db
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
